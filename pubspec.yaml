name: muslim_companion
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.9.0

  # State Management
  provider: ^6.1.5

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location
  geolocator: ^14.0.2

  # Maps
  google_maps_flutter: ^2.12.3

  # Qibla
  flutter_compass: ^0.8.1

  # Image Cache
  cached_network_image: ^3.4.1

  # Date & Time
  intl: ^0.20.2

  # Internet Check
  connectivity_plus: ^6.1.5

  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
